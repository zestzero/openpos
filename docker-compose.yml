version: '3.8'

services:
  db:
    image: postgres:16
    container_name: openpos-db
    environment:
      POSTGRES_USER: openpos
      POSTGRES_PASSWORD: openpos
      POSTGRES_DB: openpos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openpos -d openpos"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openpos-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://openpos:openpos@db:5432/openpos?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data: