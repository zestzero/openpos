[tools]
go = "1.26.2"
node = "20"
pnpm = "latest"

[env]
DATABASE_URL = "postgres://openpos:openpos@localhost:5432/openpos?sslmode=disable"
JWT_SECRET = "dev-secret-change-in-production"
PORT = "8080"

[tasks.backend]
description = "Start the Go backend API server on :8080"
run = "go run ./cmd/server"

[tasks.frontend]
description = "Start the Vite frontend hot-reload server"
dir = "frontend"
run = "pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0"

[tasks.dev]
description = "Start backend API and frontend hot-reload servers"
run = "trap 'kill 0' EXIT; mise run backend & mise run frontend & wait"

[tasks.db]
description = "Start only the local PostgreSQL container"
run = "docker compose up -d db"

[tasks.migrate]
description = "Run database migrations against the local DATABASE_URL"
run = "go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest && \"$(go env GOPATH)/bin/migrate\" -path db/migrations -database \"$DATABASE_URL\" up"

[tasks.sqlc]
description = "Regenerate sqlc output after editing db/queries/*.sql"
run = "go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1 && \"$(go env GOPATH)/bin/sqlc\" generate"

[tasks.test]
description = "Run backend and frontend tests"
run = "go test ./... && pnpm --dir frontend test -- --run"
